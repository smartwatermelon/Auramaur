# Dependabot: auto-PR bumps for GitHub Actions and Python dependencies.
# GitHub Actions: primarily tracks the smartwatermelon/github-workflows
# reusable workflow (see https://github.com/smartwatermelon/github-workflows/releases).
# pip: tracks the dependencies declared in pyproject.toml.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
